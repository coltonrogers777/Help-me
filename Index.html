<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">

<title>Touch Circle Tracker</title>

<style>
body {
    font-family: -apple-system, sans-serif;
    text-align: center;
    background: #f2f2f7;
    margin: 0;
    padding: 10px;
}

h1 {
    font-size: 20px;
}

#canvas {
    width: 90%;
    max-width: 350px;
    margin-top: 20px;
    touch-action: none;
}

#result {
    font-size: 22px;
    margin-top: 15px;
    font-weight: bold;
}

button {
    padding: 12px;
    margin-top: 10px;
    width: 80%;
    max-width: 300px;
    font-size: 16px;
    border-radius: 10px;
    border: none;
    background: #007aff;
    color: white;
}
</style>
</head>

<body>

<h1>Trace the Circle</h1>

<canvas id="canvas" width="350" height="350"></canvas>

<div id="result">Filled: 0%</div>

<button onclick="reset()">Reset</button>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

const center = { x: 175, y: 175 };
const radius = 130;

// Track filled angles (360 slices)
let filled = new Array(360).fill(false);
let isDrawing = false;

function getAngle(x, y) {
    let dx = x - center.x;
    let dy = y - center.y;
    let angle = Math.atan2(dy, dx) * 180 / Math.PI;
    return (angle + 360) % 360;
}

function drawCircle() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    for (let i = 0; i < 360; i++) {
        let start = (i - 90) * Math.PI / 180;
        let end = (i + 1 - 90) * Math.PI / 180;

        ctx.beginPath();
        ctx.arc(center.x, center.y, radius, start, end);
        ctx.lineWidth = 12;
        ctx.strokeStyle = filled[i] ? "red" : "#ddd";
        ctx.stroke();
    }

    updatePercent();
}

function updatePercent() {
    let count = filled.filter(v => v).length;
    let percent = (count / 360) * 100;
    document.getElementById("result").innerText =
        "Filled: " + percent.toFixed(1) + "%";
}

function handleTouch(e) {
    e.preventDefault();

    const rect = canvas.getBoundingClientRect();
    const touch = e.touches[0];

    const x = touch.clientX - rect.left;
    const y = touch.clientY - rect.top;

    let angle = Math.floor(getAngle(x, y));
    filled[angle] = true;

    drawCircle();
}

// Touch events
canvas.addEventListener("touchstart", (e) => {
    isDrawing = true;
    handleTouch(e);
});

canvas.addEventListener("touchmove", (e) => {
    if (isDrawing) handleTouch(e);
});

canvas.addEventListener("touchend", () => {
    isDrawing = false;
});

// Mouse support (desktop testing)
canvas.addEventListener("mousedown", (e) => {
    isDrawing = true;
});

canvas.addEventListener("mousemove", (e) => {
    if (!isDrawing) return;

    const rect = canvas.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;

    let angle = Math.floor(getAngle(x, y));
    filled[angle] = true;

    drawCircle();
});

canvas.addEventListener("mouseup", () => {
    isDrawing = false;
});

function reset() {
    filled.fill(false);
    drawCircle();
}

// Initial render
drawCircle();
</script>

</body>
</html>
